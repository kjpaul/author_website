{% extends "base.html" %}
{% block content %}<div class="post-header">
<h1>{{ post.title }}</h1>
<div class="post-meta">{{ post.date }}{% if post.categories %}<div class="post-categories">{% for cat in post.categories %}<span>{{ cat }}</span>{% endfor %}</div>{% endif %}</div></div>
{{ content | safe }}{% endblock %}
